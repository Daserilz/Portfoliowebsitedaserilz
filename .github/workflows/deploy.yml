name: Deploy Figma Make Project

on:
  push:
    branches: ["main"] # รันเมื่อมีการ Push เข้า Branch main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install # ติดตั้ง Library ที่ Figma Make ใช้

      - name: Build
        run: npm run build # สั่ง Vite Build ไฟล์ไปที่โฟลเดอร์ /dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # ระบุไปที่โฟลเดอร์ผลลัพธ์ (ไม่ใช่ '.')

      - name: Deploy
        uses: actions/deploy-pages@v4
